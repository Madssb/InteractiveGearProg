services:
  backend:
    image: ladlorchart-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=${DATATABASE_URL}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  discord_bot:
    image: ladlorapi-backend
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: ["uv", "run", "python", "discord_bot.py"]
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - BOTLOR_TOKEN=${BOTLOR_TOKEN}
      - GUILD_ID=${GUILD_ID}
      - SUBMITTED_ANNOTATIONS_CHANNEL_ID=${SUBMITTED_ANNOTATIONS_CHANNEL_ID}
      - REPORT_LOGS_CHANNEL_ID=${REPORT_LOGS_CHANNEL_ID}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    restart: unless-stopped
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARED_TUNNEL_TOKEN:-}
    depends_on:
      backend:
        condition: service_healthy

  healthcheck:
    image: curlimages/curl:8.16.0
    environment:
      - HEARTBEAT_URL=${HEARTBEAT_URL}
      - API_HEALTHCHECK_URL=${API_HEALTHCHECK_URL}
    command:
      - sh
      - -eu
      - -c
      - |
        : "$${HEARTBEAT_URL:?HEARTBEAT_URL is required}"
        while true; do
          if curl --fail --silent --show-error \
            --max-time 10 \
            "$${API_HEALTHCHECK_URL}" > /dev/null; then
            curl --fail --silent --show-error \
              --max-time 10 \
              "$${HEARTBEAT_URL}" > /dev/null
          fi
          sleep 900
        done
    depends_on:
      backend:
        condition: service_healthy
      cloudflared:
        condition: service_started
    restart: unless-stopped
