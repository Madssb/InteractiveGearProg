services:
  backend:
    image: ladlorapi-backend
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8000" # docker debug port 8001.
    env_file:
      - .env
    # healthcheck:
    #   test:
    #     [
    #       "CMD",
    #       "python",
    #       "-c",
    #       "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
    #     ]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 10s
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --config /etc/cloudflared/config.prod.yml run
    volumes:
      - ../infra/cloudflared:/etc/cloudflared
    depends_on:
      - backend
    restart: unless-stopped
